<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGG Proxy Diagnostics</title>
<style>
  body { font-family: monospace; background: #0f0e0c; color: #f0ede6; padding: 24px; max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 18px; margin-bottom: 24px; color: #e8c84a; }
  .step { background: #1a1915; border: 1px solid #2e2d29; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .step-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
  .running { background: #333; color: #aaa; }
  .ok { background: rgba(76,175,125,0.2); color: #4caf7d; }
  .fail { background: rgba(224,90,90,0.2); color: #e05a5a; }
  .output {
    margin-top: 10px; font-size: 11px; color: #c0bdb5;
    white-space: pre-wrap; word-break: break-all;
    background: #0a0a08; padding: 12px; border-radius: 4px;
    border: 1px solid #2e2d29; line-height: 1.7;
    /* NO max-height, NO overflow hidden — show everything */
  }
  textarea {
    background: #1a1915; border: 1px solid #2e2d29; color: #f0ede6;
    padding: 8px 12px; border-radius: 6px; font-family: monospace;
    font-size: 13px; width: 100%; box-sizing: border-box; margin-bottom: 8px;
    resize: vertical;
  }
  input {
    background: #1a1915; border: 1px solid #2e2d29; color: #f0ede6;
    padding: 8px 12px; border-radius: 6px; font-family: monospace;
    font-size: 13px; width: 100%; box-sizing: border-box; margin-bottom: 8px;
  }
  button {
    background: #e8c84a; color: #0f0e0c; border: none;
    padding: 8px 16px; border-radius: 6px; font-family: monospace;
    font-size: 13px; font-weight: bold; cursor: pointer; margin-right: 8px;
  }
  button.copy { background: #2e2d29; color: #f0ede6; font-size: 11px; padding: 4px 10px; margin-top: 6px; }
  button:disabled { background: #333; color: #666; cursor: default; }
  label { font-size: 12px; color: #9e9a90; display: block; margin-bottom: 4px; margin-top: 10px; }
  a { color: #e8c84a; }
  .note { font-size: 11px; color: #635f58; margin-top: 6px; }
  .url-line { font-size: 10px; color: #635f58; margin-top: 4px; word-break: break-all; }
</style>
</head>
<body>
<h1>🔧 BGG Proxy Diagnostics</h1>

<div class="step">
  <label>Cloudflare Worker URL (your VITE_BGG_PROXY_URL)</label>
  <input id="proxyUrl" placeholder="https://your-worker.your-account.workers.dev" />
  <label>BGG Username to test with</label>
  <input id="username" placeholder="e.g. Wizkid" value="Wizkid" />
  <button id="runBtn" onclick="runAll()">▶ Run all tests</button>
  <a href="/">← Back to app</a>
  <p class="note">Paste your Cloudflare Worker URL above then click Run. All output is shown in full — nothing is truncated.</p>
</div>

<div id="steps"></div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function copyText(id) {
  const el = document.getElementById(id)
  navigator.clipboard.writeText(el.textContent).catch(() => {
    const ta = document.createElement('textarea')
    ta.value = el.textContent
    document.body.appendChild(ta)
    ta.select()
    document.execCommand('copy')
    document.body.removeChild(ta)
  })
}

function renderStep(index, title, status, url, output) {
  const statusClass = status === 'running' ? 'running' : status === 'ok' ? 'ok' : 'fail'
  const statusText = status === 'running' ? '⏳ running…' : status === 'ok' ? '✓ passed' : '✗ failed'
  const outputId = 'out_' + index
  return `
    <div class="step">
      <div class="step-title">${escHtml(title)}<span class="status ${statusClass}">${statusText}</span></div>
      ${url ? `<div class="url-line">URL tested: ${escHtml(url)}</div>` : ''}
      ${output !== undefined ? `
        <div class="output" id="${outputId}">${escHtml(output)}</div>
        <button class="copy" onclick="copyText('${outputId}')">📋 Copy output</button>
      ` : ''}
    </div>`
}

async function runStep(title, fn, proxyUrl, username) {
  try {
    return await fn(proxyUrl, username)
  } catch(e) {
    return { ok: false, note: 'JS exception: ' + String(e) + '\n' + (e.stack || ''), url: '' }
  }
}

const stepDefs = [
  {
    title: 'Step 1 — Direct BGG fetch from browser (expects CORS block)',
    fn: async (proxyUrl, username) => {
      const url = 'https://boardgamegeek.com/xmlapi2/collection?username=' + username
      try {
        const res = await fetch(url)
        const text = await res.text()
        return { ok: false, url, note: 'WARNING: Request was NOT blocked by CORS — HTTP ' + res.status + '\nBody: ' + text }
      } catch(e) {
        return { ok: true, url, note: 'Correctly blocked by CORS (expected):\n' + String(e) }
      }
    }
  },
  {
    title: 'Step 2 — Cloudflare Worker is reachable at all',
    fn: async (proxyUrl) => {
      if (!proxyUrl) return { ok: false, url: '', note: 'No proxy URL entered above.' }
      const url = proxyUrl + '?path=collection&username=test'
      try {
        const res = await fetch(url)
        const text = await res.text()
        const headers = {}
        res.headers.forEach((v, k) => { headers[k] = v })
        return {
          ok: true,
          url,
          note: 'HTTP ' + res.status + '\nHeaders: ' + JSON.stringify(headers, null, 2) + '\n\nBody (' + text.length + ' chars):\n' + text
        }
      } catch(e) {
        return {
          ok: false,
          url,
          note: 'Could not reach worker at all.\nError: ' + String(e) + '\n\nCheck:\n- Is the URL correct?\n- Is the worker deployed on Cloudflare?\n- Did deployment succeed without errors?'
        }
      }
    }
  },
  {
    title: 'Step 3 — Worker proxies BGG and returns XML',
    fn: async (proxyUrl, username) => {
      if (!proxyUrl) return { ok: false, url: '', note: 'No proxy URL entered above.' }
      const url = proxyUrl + '?path=collection&username=' + username + '&stats=1'
      try {
        const res = await fetch(url)
        const text = await res.text()
        const headers = {}
        res.headers.forEach((v, k) => { headers[k] = v })
        const ok = res.status === 200 || res.status === 202
        return {
          ok,
          url,
          note: 'HTTP ' + res.status + '\nHeaders: ' + JSON.stringify(headers, null, 2) + '\n\nFull body (' + text.length + ' chars):\n' + text
        }
      } catch(e) {
        return { ok: false, url, note: String(e) }
      }
    }
  },
  {
    title: 'Step 4 — Response parses as XML with game items',
    fn: async (proxyUrl, username) => {
      if (!proxyUrl) return { ok: false, url: '', note: 'No proxy URL entered above.' }
      const url = proxyUrl + '?path=collection&username=' + username + '&stats=1&excludesubtype=boardgameexpansion'
      try {
        const res = await fetch(url)
        const text = await res.text()
        if (!res.ok) return { ok: false, url, note: 'HTTP ' + res.status + '\n\n' + text }
        const parser = new DOMParser()
        const doc = parser.parseFromString(text, 'text/xml')
        if (doc.querySelector('parsererror')) {
          return { ok: false, url, note: 'XML parse failed.\n\nRaw body:\n' + text }
        }
        const error = doc.querySelector('error')
        if (error) return { ok: false, url, note: 'BGG returned error element:\n' + error.textContent + '\n\nFull XML:\n' + text }
        const message = doc.querySelector('message')
        if (message) return { ok: false, url, note: 'BGG queued the request (try again in 5s):\n' + message.textContent + '\n\nFull XML:\n' + text }
        const items = doc.querySelectorAll('item')
        return {
          ok: items.length > 0,
          url,
          note: 'Parsed OK. Found ' + items.length + ' items.\n' + (items.length > 0 ? 'First game: ' + (items[0].querySelector('name') || {}).textContent : 'No items found — collection may be empty.')
        }
      } catch(e) {
        return { ok: false, url, note: String(e) }
      }
    }
  },
  {
    title: 'Step 5 — App /api/bgg fallback route (Vercel function)',
    fn: async (proxyUrl, username) => {
      const url = '/api/bgg?path=collection&username=' + username
      try {
        const res = await fetch(url)
        const text = await res.text()
        return {
          ok: res.status !== 404,
          url,
          note: 'HTTP ' + res.status + '\n\n' + (res.status === 404
            ? '404 — /api/bgg Vercel function not found or not deployed.\nMake sure api/bgg.js is committed and pushed.'
            : 'Body (' + text.length + ' chars):\n' + text)
        }
      } catch(e) {
        return { ok: false, url, note: String(e) }
      }
    }
  }
]

async function runAll() {
  const proxyUrl = (document.getElementById('proxyUrl').value || '').trim().replace(/\/$/, '')
  const username = (document.getElementById('username').value || '').trim() || 'Wizkid'
  document.getElementById('runBtn').disabled = true

  const container = document.getElementById('steps')
  container.innerHTML = stepDefs.map((s, i) => renderStep(i, s.title, 'running', '', undefined)).join('')

  for (let i = 0; i < stepDefs.length; i++) {
    const result = await runStep(stepDefs[i].title, stepDefs[i].fn, proxyUrl, username)
    // Re-render all steps, updating the current one
    const allStepEls = container.querySelectorAll('.step')
    allStepEls[i].outerHTML = renderStep(i, stepDefs[i].title, result.ok ? 'ok' : 'fail', result.url || '', result.note || '')
  }

  document.getElementById('runBtn').disabled = false
}
</script>
</body>
</html>
